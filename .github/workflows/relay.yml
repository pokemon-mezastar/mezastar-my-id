name: Remote Trigger Relay

# Change "on:" to accept BOTH manual UI clicks and the web dispatch signal
on:
  workflow_dispatch:
  repository_dispatch:
    types: [remote_trigger_scraper]

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Private Scraper
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: bearer ${{ secrets.HIDDEN_SCRAPER_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CyberDefenderDavid/mezastar-scraper-vn/dispatches \
            -d '{"event_type": "remote_trigger_scraper"}'
